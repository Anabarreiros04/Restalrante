<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas — La Casita Mexicana</title>
    <link rel="icon" type="image/png" href="img/logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --oro: #BF8F54;
            --crema: #F5ECD7;
            --negro: #080808;
            --input-bg: #1a1714;
        }

        body {
            background: var(--negro);
            color: var(--crema);
            font-family: 'Cormorant Garamond', serif;
        }

        /* ── NAV ── */
        nav {
            padding: 20px 48px;
            background: rgba(8,8,8,0.95);
            border-bottom: 1px solid rgba(191,143,84,0.2);
            display: flex; justify-content: space-between; align-items: center;
        }

        .nav-logo { font-family: 'Cinzel'; color: var(--oro); text-decoration: none; letter-spacing: 3px; }

        /* ── FORMULÁRIO DE RESERVA ── */
        .reserva-container {
            max-width: 800px;
            margin: 80px auto;
            padding: 40px;
            background: #12100d;
            border: 1px solid rgba(191,143,84,0.3);
            border-radius: 4px;
        }

        .reserva-header { text-align: center; margin-bottom: 40px; }
        .reserva-header h1 { font-family: 'Playfair Display'; font-size: 3rem; margin-bottom: 10px; }
        .reserva-header p { font-family: 'Cinzel'; color: var(--oro); letter-spacing: 3px; font-size: 0.8rem; }

        label { 
            display: block; font-family: 'Cinzel'; font-size: 0.7rem; 
            color: var(--oro); margin-bottom: 8px; margin-top: 20px;
        }

        input, select, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(191,143,84,0.2);
            padding: 12px;
            color: var(--crema);
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--oro); }

        .btn-enviar {
            width: 100%;
            background: var(--oro);
            color: var(--negro);
            border: none;
            padding: 18px;
            margin-top: 40px;
            font-family: 'Cinzel';
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-enviar:hover { background: #d9af62; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .reserva-container { margin: 40px 20px; padding: 25px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">LA CASITA MEXICANA</a>
        <a href="index.html" style="color: var(--crema); text-decoration: none; font-family: 'Cinzel'; font-size: 0.7rem;">Voltar</a>
    </nav>

    <div class="reserva-container">
        <div class="reserva-header">
            <p>Solicitação de Mesa</p>
            <h1>Sua Reserva</h1>
        </div>

        <form>
            <div class="row">
                <div class="col-md-6">
                    <label>Nome Completo</label>
                    <input type="text" placeholder="Como podemos chamá-lo?">
                </div>
                <div class="col-md-6">
                    <label>Telefone / WhatsApp</label>
                    <input type="tel" placeholder="(00) 00000-0000">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <label>Data</label>
                    <input type="date">
                </div>
                <div class="col-md-4">
                    <label>Horário</label>
                    <input type="time">
                </div>
                <div class="col-md-4">
                    <label>Pessoas</label>
                    <select>
                        <option>2 Pessoas</option>
                        <option>3 Pessoas</option>
                        <option>4 Pessoas</option>
                        <option>5+ Pessoas</option>
                    </select>
                </div>
            </div>

            <label>Observações Especiais</label>
            <textarea rows="4" placeholder="Alguma alergia ou comemoração especial?"></textarea>

            <button type="submit" class="btn-enviar">CONFIRMAR SOLICITAÇÃO</button>
        </form>
    </div>


    
</body>
</html>
